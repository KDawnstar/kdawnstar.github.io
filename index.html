<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모험의 시작 v3.0 (모듈화 완전판)</title>
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
.system-notice-anchor {
    position: absolute;
    top: 118px;
    left: 50%;
    transform: translateX(-50%);
    width: 420px;
    min-height: 56px;
    z-index: 14;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.system-notice-item {
    width: 100%;
    min-height: 56px;
    padding: 12px 16px;
    box-sizing: border-box;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(10,14,20,0.90), rgba(6,9,14,0.82));
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow:
        0 10px 24px rgba(0,0,0,0.28),
        inset 0 0 10px rgba(255,255,255,0.03);
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #f1c40f;
    font-size: 20px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: 0.2px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.72);
}

.system-notice-item.notice-purple { color: #caa7ff; }
.system-notice-item.notice-green { color: #8ff0b0; }
.system-notice-item.notice-yellow { color: #ffd86b; }

#gameSection {
    display: flex;
    flex-direction: column;
    width: 1600px;
    height: 1020px;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    border: 2px solid #333;
    margin-top: 20px;
    background: #05070a;
}

#gameCanvas {
    background-color: #2c3e50;
    width: 100%;
    height: 100%;
    display: block;
}

#hudSection {
    position: relative;
    width: 1600px;
    height: 220px;
    background:
        linear-gradient(to bottom, rgba(22,28,38,0.98), rgba(9,12,18,1));
    border-top: 1px solid rgba(255,255,255,0.08);
    box-sizing: border-box;
}

#gameViewport {
    position: relative;
    width: 1600px;
    height: 800px;
    overflow: hidden;
    background: #2c3e50;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

#topLeftUI {
    position: absolute;
    top: 14px;
    left: 14px;
    min-width: 248px;
    background: rgba(8, 10, 14, 0.46);
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.10);
    z-index: 10;
    backdrop-filter: blur(3px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    box-sizing: border-box;
}

.ui-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    width: 100%;
    gap: 8px;
    flex-wrap: nowrap;
}

.ui-title {
    margin: 0;
    font-size: 14px;
    color: #7fc6ff;
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.55);
    white-space: nowrap;
    flex: 1 1 auto;
    min-width: 0;
}

.toggle-btn {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    color: white;
    cursor: pointer;
    border-radius: 6px;
    padding: 2px 7px;
    font-weight: 700;
    font-size: 11px;
    backdrop-filter: blur(2px);
}
.toggle-btn:hover { background: rgba(255,255,255,0.16); }

#guideContent {
    font-size: 11px;
    color: rgba(255,255,255,0.88);
    line-height: 1.55;
}

.key-hint {
    color: #f1c40f;
    font-weight: 700;
    background: rgba(0,0,0,0.36);
    padding: 2px 5px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.10);
    display: inline-block;
    margin-bottom: 3px;
}

#topRightUI {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 192px;
    z-index: 10;
    pointer-events: none;
}

.spawn-btn {
    pointer-events: auto;
    padding: 6px 9px;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 7px;
    transition: 0.1s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.22);
    width: 100%;
    backdrop-filter: blur(2px);
}
.spawn-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
.spawn-btn:active { transform: scale(0.98); }

.mob-lock {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.56);
    color: #ff7d7d;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    border-radius: 7px;
    font-size: 11px;
    pointer-events: auto;
    cursor: not-allowed;
    border: 1px solid rgba(255,100,100,0.30);
}

#bottomHUD {
    position: relative;
    width: 100%;
    height: 100%;
    background: transparent;
    border: 0;
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr) 430px;
    align-items: center;
    column-gap: 22px;
    padding: 18px 22px;
    box-sizing: border-box;
    z-index: 50;
    box-shadow: none;
    border-radius: 0;
    backdrop-filter: none;
    transform: none;
    left: auto;
    bottom: auto;
}

#hudDebug {
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    color: #8dff93;
    padding: 10px 12px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    overflow-y: auto;
    line-height: 1.45;
    box-sizing: border-box;
}

.hud-debug-wrap.collapsed #hudDebug {
    display: none;
}

.hud-debug-wrap {
    width: 100%;
    height: 160px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(8,12,18,0.78), rgba(0,0,0,0.42));
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.20),
        0 8px 20px rgba(0,0,0,0.18);
    box-sizing: border-box;
    overflow: hidden;
}

.hud-debug-header {
    height: 38px;
    flex: 0 0 38px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px 0 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-sizing: border-box;
}

.hud-debug-title {
    font-size: 12px;
    font-weight: 800;
    color: #8dff93;
    letter-spacing: 0.3px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.45);
}

.hud-debug-toggle {
    min-width: 58px;
    height: 24px;
    padding: 0 8px;
    background: rgba(255,255,255,0.08);
    color: #eaf7ee;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 7px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
}
.hud-debug-toggle:hover {
    background: rgba(255,255,255,0.14);
}

#hudCenter {
    min-width: 0;
    width: 100%;
    height: 160px;
    display: grid;
    grid-template-columns: 132px minmax(0, 1fr);
    align-items: center;
    column-gap: 18px;
    padding: 10px 14px;
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    box-shadow: inset 0 0 12px rgba(255,255,255,0.02);
    box-sizing: border-box;
    text-align: center;
}

.hud-name {
    font-size: 18px;
    font-weight: 800;
    color: #eef6ff;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.55);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
    line-height: 1.2;
    max-width: 100%;
    word-break: keep-all;
    overflow-wrap: anywhere;
}
.hud-center-main {
    min-width: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

.hud-center-sub {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.72);
    margin-bottom: 10px;
    letter-spacing: 0.2px;
}

.hud-center-divider {
    width: 100%;
    max-width: 460px;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.18), rgba(255,255,255,0));
    margin: 4px 0 10px;
}

.hud-center-exp-wrap {
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
}

.hud-center-exp-bar {
    height: 14px;
    margin-bottom: 0;
    border-radius: 999px;
    background: rgba(0,0,0,0.54);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.24);
}

.hud-center-exp-bar .hud-bar-text {
    font-size: 9px;
    color: #fff;
    letter-spacing: 0;
}

.hud-mode-chip-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
}

.hud-mode-chip {
    min-width: 72px;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2px;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: inset 0 0 8px rgba(255,255,255,0.03);
}

.hud-mode-chip.melee {
    background: linear-gradient(180deg, rgba(192,57,43,0.26), rgba(128,30,20,0.22));
    color: #ffd9d3;
}

.hud-mode-chip.range {
    background: linear-gradient(180deg, rgba(52,152,219,0.24), rgba(24,84,124,0.20));
    color: #d8efff;
}

.hud-orb-panel {
    width: 124px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.hud-orb-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.25px;
    color: rgba(255,255,255,0.68);
}

.hud-orb {
    position: relative;
    width: 102px;
    height: 102px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.14);
    box-shadow:
        inset 0 10px 20px rgba(255,255,255,0.08),
        inset 0 -14px 18px rgba(0,0,0,0.34),
        0 8px 16px rgba(0,0,0,0.22);
    background: radial-gradient(circle at 35% 28%, rgba(255,255,255,0.20), rgba(255,255,255,0.04) 34%, rgba(0,0,0,0.42) 100%);
}

.hud-orb.hp {
    background-color: rgba(40, 8, 8, 0.95);
}

.hud-orb.exp {
    background-color: rgba(8, 20, 34, 0.95);
}

.hud-orb-fill {
    position: absolute;
    left: 0;
    bottom: 0;
    top: auto;
    width: 100%;
    height: 0%;
    z-index: 1;
    transition: height 0.12s ease-out;
}

.hud-orb.hp .hud-orb-fill {
    background:
        radial-gradient(circle at 50% 30%, rgba(255,210,210,0.28), rgba(255,210,210,0) 48%),
        linear-gradient(180deg, rgba(255,120,120,0.92), rgba(192,32,32,0.94));
    box-shadow: inset 0 0 16px rgba(255,255,255,0.08);
}

.hud-orb.exp .hud-orb-fill {
    background:
        radial-gradient(circle at 50% 30%, rgba(210,240,255,0.24), rgba(210,240,255,0) 48%),
        linear-gradient(180deg, rgba(110,210,255,0.92), rgba(30,110,185,0.94));
    box-shadow: inset 0 0 16px rgba(255,255,255,0.08);
}

.hud-orb-gloss {
    position: absolute;
    top: 8px;
    left: 18px;
    width: 48px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    filter: blur(2px);
    transform: rotate(-16deg);
    z-index: 3;
    pointer-events: none;
}

.hud-orb-ring {
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 3;
    pointer-events: none;
}

.hud-orb-text {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 10px;
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: -0.1px;
    color: #ffffff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.86);
    pointer-events: none;
    white-space: pre-line;
}

.hud-orb-percent {
    font-size: 9px;
    opacity: 0.88;
    display: block;
    margin-top: 2px;
}

.hud-bar-container {
    width: 100%;
    height: 24px;
    background: rgba(0,0,0,0.56);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px;
    position: relative;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.24);
}

.hud-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    transition: width 0.1s;
}

.hud-exp-container {
    height: 14px;
    margin-bottom: 0;
}

.hud-exp-fill {
    height: 100%;
    background: linear-gradient(90deg, #27ae60, #2ecc71);
    transition: width 0.3s ease-out;
}

.hud-bar-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 12px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.80);
}

.hud-exp-container .hud-bar-text {
    font-size: 10px;
    color: #fff;
}

#hudSkills {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    padding-bottom: 0;
}

.hud-skill-wrap {
    width: 430px;
    height: 160px;
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, rgba(20,24,32,0.78), rgba(8,10,15,0.48));
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
        inset 0 0 10px rgba(255,255,255,0.02),
        0 8px 20px rgba(0,0,0,0.18);
    overflow: hidden;
    box-sizing: border-box;
}

.hud-skill-header {
    height: 38px;
    flex: 0 0 38px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border-bottom: 1px solid rgba(255,255,255,0.08);
    box-sizing: border-box;
}

.hud-skill-title {
    font-size: 12px;
    font-weight: 800;
    color: #f4d36a;
    letter-spacing: 0.3px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.45);
}

.hud-skill-sub {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.72);
}

.hud-skill-body {
    flex: 1 1 auto;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 12px 16px;
    box-sizing: border-box;
}

.skill-slot {
    width: 84px;
    height: 84px;
    background:
        radial-gradient(circle at 30% 24%, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 34%, rgba(0,0,0,0.12) 100%),
        linear-gradient(135deg, rgba(52,73,94,0.92), rgba(16,22,30,0.96));
    border: 2px solid rgba(241,196,15,0.68);
    border-radius: 16px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow:
        0 0 16px rgba(218,165,32,0.14),
        inset 0 0 14px rgba(255,255,255,0.04),
        inset 0 -10px 16px rgba(0,0,0,0.24);
    backdrop-filter: blur(3px);
    overflow: hidden;
}

.skill-icon {
    width: 72%;
    height: 72%;
    z-index: 3;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.32));
}

.skill-key {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    min-width: 22px;
    text-align: center;
    background: rgba(12,12,12,0.92);
    color: #f1c40f;
    font-size: 11px;
    font-weight: 800;
    line-height: 1;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid rgba(241,196,15,0.46);
    z-index: 10;
    box-shadow: 1px 1px 4px rgba(0,0,0,0.30);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.65);
}

.skill-cd-mask {
    position: absolute;
    inset: auto 0 0 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.68));
    transition: height 0.05s linear;
    z-index: 4;
    border-radius: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
}

.skill-lock {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 800;
    color: #f5d27a;
    background: rgba(6,8,12,0.62);
    text-shadow: 1px 1px 3px rgba(0,0,0,0.72);
    backdrop-filter: blur(2px);
}

#gameOverScreen {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.34);
    z-index: 100;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#gameOverScreen h1 {
    color: #e74c3c;
    font-size: 52px;
    text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 0 18px #c0392b;
    margin-bottom: 4px;
    font-weight: 900;
    letter-spacing: 3px;
}

.btn-revive {
    background-color: rgba(243,156,18,0.88);
    color: white;
    font-size: 16px;
    padding: 11px 28px;
    margin-top: 16px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 9px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    transition: 0.1s;
}
.btn-revive:hover { transform: scale(1.03); }
.btn-revive:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="gameSection">
    <div id="gameViewport">
        <canvas id="gameCanvas" width="1400" height="800"></canvas>

        <div id="topLeftUI">
            <div class="ui-header">
                <h3 class="ui-title">📜 2.5D 조작 가이드</h3>
                <button class="toggle-btn" id="toggleGuideBtn" onclick="toggleGuide()">[-] 접기</button>
            </div>
            <div id="guideContent">
                <span class="key-hint">방향키</span> 8방향 이동 (X, Y축)<br>
                <span class="key-hint">C</span> 점프 &nbsp; <span class="key-hint">Z</span> 대쉬 (Lv.2)<br>
                <span class="key-hint">X</span> 평타 &nbsp; <span class="key-hint">F</span> 무기 스왑 (Lv.3)<br>
                <span class="key-hint">A</span> 웨이브 (Lv.4) &nbsp; <span class="key-hint">S</span> 캐논볼 (Lv.5)<br>
                <span class="key-hint">1~9</span> 몬스터 스포너 / 보스 강림<br>
                <span class="key-hint" style="background:#e74c3c;">V</span> 3D 히트박스 디버그
            </div>
        </div>

        <div id="topRightUI"></div>

        <div id="systemNoticeUI" class="system-notice-anchor">
            <div class="system-notice-item notice-yellow" id="systemNoticePreview" style="display:none;">
                시스템 알림
            </div>
        </div>

        <div id="gameOverScreen">
            <h1>YOU DIED</h1>
            <button class="btn-revive" onclick="PlayerManager.revive(gameState)">🪙 코인 사용 (부활 - R키)</button>
        </div>
    </div>

    <div id="hudSection" data-base-height="220">
        <div id="bottomHUD">
            <div class="hud-debug-wrap" id="hudDebugWrap">
            <div class="hud-debug-header">
             <div class="hud-debug-title">디버그 패널</div>
             <button
                 type="button"
                class="hud-debug-toggle"
                onclick="
                const wrap = document.getElementById('hudDebugWrap');
                const collapsed = wrap.classList.toggle('collapsed');
                this.innerText = collapsed ? '[+] 열기' : '[-] 접기';
            "
             >[-] 접기</button>
            </div>
