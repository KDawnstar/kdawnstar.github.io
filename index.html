<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모험의 시작 v3.0 (모듈화 완전판)</title>
    <style>
        body { margin: 0; background-color: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        #gameSection { display: block; width: 1600px; height: 900px; position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8); border: 2px solid #333; margin-top: 20px; }
        #gameCanvas { background-color: #2c3e50; width: 100%; height: 100%; display: block; }
        
#topLeftUI {
    position: absolute;
    top: 14px;
    left: 14px;
    background: rgba(8, 10, 14, 0.46);
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.10);
    z-index: 10;
    backdrop-filter: blur(3px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.ui-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    width: 196px;
    gap: 8px;
}

.ui-title {
    margin: 0;
    font-size: 14px;
    color: #7fc6ff;
    font-weight: 700;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.55);
}

.toggle-btn {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.16);
    color: white;
    cursor: pointer;
    border-radius: 6px;
    padding: 2px 7px;
    font-weight: 700;
    font-size: 11px;
    backdrop-filter: blur(2px);
}
.toggle-btn:hover { background: rgba(255,255,255,0.16); }

#guideContent {
    font-size: 11px;
    color: rgba(255,255,255,0.88);
    line-height: 1.55;
}

.key-hint {
    color: #f1c40f;
    font-weight: 700;
    background: rgba(0,0,0,0.36);
    padding: 2px 5px;
    border-radius: 5px;
    border: 1px solid rgba(255,255,255,0.10);
    display: inline-block;
    margin-bottom: 3px;
}

#topRightUI {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    width: 192px;
    z-index: 10;
    pointer-events: none;
}

.spawn-btn {
    pointer-events: auto;
    padding: 6px 9px;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 7px;
    transition: 0.1s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.22);
    width: 100%;
    backdrop-filter: blur(2px);
}
.spawn-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
.spawn-btn:active { transform: scale(0.98); }

.mob-lock {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.56);
    color: #ff7d7d;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    border-radius: 7px;
    font-size: 11px;
    pointer-events: auto;
    cursor: not-allowed;
    border: 1px solid rgba(255,100,100,0.30);
}

#bottomHUD {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 24px);
    height: 92px;
    background: linear-gradient(to bottom, rgba(25,32,42,0.50), rgba(12,17,24,0.58));
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    box-sizing: border-box;
    z-index: 50;
    box-shadow: 0 10px 28px rgba(0,0,0,0.24);
    border-radius: 14px;
    backdrop-filter: blur(5px);
}

#hudDebug {
    width: 250px;
    height: 58px;
    background: rgba(0,0,0,0.34);
    color: #8dff93;
    padding: 8px 9px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow-y: auto;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.14);
    line-height: 1.35;
}

#hudCenter {
    width: 500px;
    text-align: center;
}

.hud-name {
    font-size: 17px;
    font-weight: 700;
    color: #eef6ff;
    text-shadow: 1px 1px 1px rgba(0,0,0,0.45);
    margin-bottom: 6px;
    letter-spacing: 0.4px;
}

.hud-bar-container {
    width: 100%;
    height: 18px;
    background: rgba(0,0,0,0.56);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 999px;
    position: relative;
    margin-bottom: 5px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.20);
}

.hud-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #c0392b, #e74c3c);
    transition: width 0.1s;
}

.hud-exp-container {
    height: 12px;
}

.hud-exp-fill {
    height: 100%;
    background: linear-gradient(90deg, #27ae60, #2ecc71);
    transition: width 0.3s ease-out;
}

.hud-bar-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 11px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.75);
}

.hud-exp-container .hud-bar-text {
    font-size: 10px;
    color: #fff;
}

#hudSkills {
    display: flex;
    gap: 12px;
    padding-bottom: 4px;
}

.skill-slot {
    width: 58px;
    height: 58px;
    background: linear-gradient(135deg, rgba(44,62,80,0.62), rgba(26,37,47,0.74));
    border: 2px solid rgba(241,196,15,0.55);
    border-radius: 10px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 10px rgba(218,165,32,0.14);
    backdrop-filter: blur(3px);
}

.skill-icon {
    width: 64%;
    height: 64%;
    z-index: 3;
}

.skill-key {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(18,18,18,0.82);
    color: #f1c40f;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 999px;
    border: 1px solid rgba(241,196,15,0.42);
    z-index: 10;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.28);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.65);
}

.skill-cd-mask {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    background: rgba(0,0,0,0.56);
    transition: height 0.05s linear;
    z-index: 4;
    border-radius: 8px;
}

.skill-lock {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.54);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 5;
    border-radius: 8px;
}

#gameOverScreen {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.34);
    z-index: 100;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

#gameOverScreen h1 {
    color: #e74c3c;
    font-size: 52px;
    text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 0 18px #c0392b;
    margin-bottom: 4px;
    font-weight: 900;
    letter-spacing: 3px;
}

.btn-revive {
    background-color: rgba(243,156,18,0.88);
    color: white;
    font-size: 16px;
    padding: 11px 28px;
    margin-top: 16px;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 9px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.22);
    transition: 0.1s;
}
.btn-revive:hover { transform: scale(1.03); }
.btn-revive:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="gameSection">
        <canvas id="gameCanvas" width="1600" height="900"></canvas>
        
        <div id="topLeftUI">
            <div class="ui-header">
                <h3 class="ui-title">📜 2.5D 조작 가이드</h3>
                <button class="toggle-btn" id="toggleGuideBtn" onclick="toggleGuide()">[-] 접기</button>
            </div>
            <div id="guideContent">
                <span class="key-hint">방향키</span> 8방향 이동 (X, Y축)<br>
                <span class="key-hint">C</span> 점프 &nbsp; <span class="key-hint">Z</span> 대쉬 (Lv.2)<br>
                <span class="key-hint">X</span> 평타 &nbsp; <span class="key-hint">F</span> 무기 스왑 (Lv.3)<br>
                <span class="key-hint">A</span> 웨이브 (Lv.4) &nbsp; <span class="key-hint">S</span> 캐논볼 (Lv.5)<br>
                <span class="key-hint">1~9</span> 몬스터 스포너 / 보스 강림<br>
                <span class="key-hint" style="background:#e74c3c;">V</span> 3D 히트박스 디버그
            </div>
        </div>

        <div id="topRightUI"></div>

        <div id="bottomHUD">
            <div id="hudDebug">디버그 로그 대기 중...</div>
            <div id="hudCenter">
                <div class="hud-name" id="hudPlayerName">Lv.1 모험가</div>
                <div class="hud-bar-container"><div class="hud-hp-fill" id="hudHpFill"></div><div class="hud-bar-text" id="hudHpText">1000 / 1000</div></div>
                <div class="hud-bar-container hud-exp-container"><div class="hud-exp-fill" id="hudExpFill"></div><div class="hud-bar-text" id="hudExpText">0 / 100 (0.0%)</div></div>
            </div>
            <div id="hudSkills">
                <div class="skill-slot">
                    <svg class="skill-icon" viewBox="0 0 100 100">
                        <path d="M20,80 L80,20" stroke="#bdc3c7" stroke-width="8" stroke-linecap="round"/>
                        <path d="M15,85 L35,65" stroke="#f1c40f" stroke-width="12" stroke-linecap="round"/>
                        <path d="M20,20 L80,80" stroke="#7f8c8d" stroke-width="12" stroke-linecap="round"/>
                        <path d="M60,60 L90,90" stroke="#2c3e50" stroke-width="18" stroke-linecap="round"/>
                    </svg>
                    <div class="skill-cd-mask" id="maskSwap"></div><div class="skill-lock" id="lockSwap">🔒</div><div class="skill-key">F</div>
                </div>
                <div class="skill-slot">
                    <svg class="skill-icon" viewBox="0 0 100 100">
                        <path d="M10,40 L40,40 M20,60 L50,60 M15,80 L45,80" stroke="#2ecc71" stroke-width="6" stroke-linecap="round"/>
                        <path d="M50,20 L80,50 L50,80" fill="none" stroke="#2ecc71" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <div class="skill-cd-mask" id="maskDash"></div><div class="skill-lock" id="lockDash">🔒</div><div class="skill-key">Z</div>
                </div>
                <div class="skill-slot">
                    <svg class="skill-icon" viewBox="0 0 100 100">
                        <path d="M70,10 A40,40 0 0,0 70,90 A50,50 0 0,1 70,10 Z" fill="#3498db" stroke="#2980b9" stroke-width="3"/>
                    </svg>
                    <div class="skill-cd-mask" id="maskWave"></div><div class="skill-lock" id="lockWave">🔒</div><div class="skill-key">A</div>
                </div>
                <div class="skill-slot">
                    <svg class="skill-icon" viewBox="0 0 100 100">
                        <circle cx="45" cy="55" r="30" fill="#2c3e50" stroke="#1a252f" stroke-width="4"/>
                        <path d="M65,35 Q75,20 90,10 Q80,30 75,40" fill="#e74c3c"/>
                        <circle cx="70" cy="30" r="5" fill="#f1c40f"/>
                    </svg>
                    <div class="skill-cd-mask" id="maskCannon"></div><div class="skill-lock" id="lockCannon">🔒</div><div class="skill-key">S</div>
                </div>
            </div>
        </div>
        <div id="gameOverScreen">
            <h1>YOU DIED</h1>
            <button class="btn-revive" onclick="PlayerManager.revive(gameState)">🪙 코인 사용 (부활 - R키)</button>
        </div>
    </div>

    <script src="js/renderer_core.js"></script>
    <script src="js/renderer_stage.js"></script>
    <script src="js/renderer_player.js"></script>
    <script src="js/renderer_monster.js"></script>
    <script src="js/renderer_overlay.js"></script>

    <script src="js/player_core.js"></script>
    <script src="js/player_action.js"></script>

    <script src="js/monster_core.js"></script>
    <script src="js/monster_ai.js"></script>
    <script src="js/monster_skill.js"></script>

    <script src="js/main.js"></script>

</body>
</html>
