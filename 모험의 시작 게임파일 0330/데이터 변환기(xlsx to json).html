<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기획자 전용 Excel to JSON Exporter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; padding: 50px; text-align: center; }
        .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; margin-bottom: 20px; }
        .btn { border: 2px solid #3498db; color: #fff; background-color: #3498db; padding: 12px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background-color: #2980b9; }
        .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        #status { font-weight: bold; color: #27ae60; font-size: 18px; margin-top: 20px; }
        .log { margin-top: 15px; font-size: 14px; color: #7f8c8d; text-align: left; background: #ecf0f1; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 엑셀 -> JSON 자동 분할 추출기</h1>
    <p style="color: #7f8c8d; margin-bottom: 30px;">엑셀 파일을 업로드하면 각 시트별로 JSON 파일이 개별 다운로드됩니다.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn">엑셀 파일 업로드 (.xlsx)</button>
        <input type="file" id="excelFile" accept=".xlsx, .xls" />
    </div>

    <div id="status">대기 중...</div>
    <div class="log" id="logBox">추출 내역이 여기에 표시됩니다.</div>
</div>

<script>
    document.getElementById('excelFile').addEventListener('change', handleFile, false);

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('status').innerText = "변환 진행 중...";
        document.getElementById('status').style.color = "#f39c12";
        const logBox = document.getElementById('logBox');
        logBox.innerHTML = "";

        const reader = new FileReader();
        reader.onload = function(event) {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            let count = 0;

            workbook.SheetNames.forEach(function(sheetName) {
                // 시트의 데이터를 JSON 객체 배열로 변환 (빈 칸은 ""로 처리)
                const roa = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {defval: ""});
                
                // 데이터가 존재하는 시트만 추출
                if(roa.length > 0) {
                    const jsonStr = JSON.stringify(roa, null, 2);
                    const blob = new Blob([jsonStr], {type: "application/json"});
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = sheetName + ".json"; // 시트 이름을 파일명으로 지정
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    logBox.innerHTML += `✅ [${sheetName}.json] 추출 완료 (총 ${roa.length}행)<br>`;
                    count++;
                } else {
                    logBox.innerHTML += `⚠️ [${sheetName}] 빈 시트이므로 건너뜁니다.<br>`;
                }
            });

            document.getElementById('status').innerText = `성공! 총 ${count}개의 JSON 파일이 다운로드 되었습니다.`;
            document.getElementById('status').style.color = "#27ae60";
        };
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
